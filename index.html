<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ProofBox</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css">
<script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0e0c;--surface:#1a1815;--border:#2e2b26;--amber:#d4820e;--amber-l:#f0a832;--amber-d:#7a4a08;--red:#c0392b;--blue:#2980b9;--green:#27ae60;--text:#e8e2d6;--muted:#7a7268}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh}
.app{max-width:400px;margin:0 auto;padding:16px 12px 48px}
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 0 20px}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;letter-spacing:.04em}
.logo span{color:var(--amber)}
.status-row{display:flex;align-items:center;gap:6px;font-size:11px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--red);transition:background .3s}
.dot.ok{background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(39,174,96,.2)}50%{box-shadow:0 0 0 6px rgba(39,174,96,.1)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card-label{font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.temp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.temp-big{font-family:'Syne',sans-serif;font-size:44px;font-weight:700;line-height:1;color:var(--amber-l)}
.temp-big sup{font-size:18px;vertical-align:super;color:var(--amber)}
.temp-sub{font-size:11px;color:var(--muted);margin-top:4px}
.target-row{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.target-lbl{font-size:11px;color:var(--muted)}
.stepper{display:flex;gap:4px;margin-left:auto}
.step-btn{width:36px;height:36px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:6px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.step-btn:active{background:var(--amber-d)}
.rise-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.rise-val{font-family:'Syne',sans-serif;font-size:30px;font-weight:700;color:var(--amber-l)}
.rise-x{font-size:14px;color:var(--amber)}
.track{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--amber-d),var(--amber-l));transition:width .8s ease}
.marks{display:flex;justify-content:space-between;margin-top:4px}
.marks span{font-size:9px;color:var(--muted)}
.ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ctrl-btn{padding:16px 8px;border-radius:10px;border:1px solid var(--border);background:var(--bg);cursor:pointer;text-align:center;transition:all .15s}
.ctrl-btn.on-heat{border-color:var(--amber);background:rgba(212,130,14,.12)}
.ctrl-btn.on-cool{border-color:var(--blue);background:rgba(41,128,185,.12)}
.ctrl-btn:active{transform:scale(.96)}
.ctrl-icon{font-size:24px;display:block;margin-bottom:6px}
.hi{color:var(--amber)}.ci{color:#5dade2}
.ctrl-name{font-size:13px;color:var(--text)}
.ctrl-st{font-size:10px;margin-top:3px;color:var(--muted)}
.ctrl-btn.on-heat .ctrl-st{color:var(--amber)}
.ctrl-btn.on-cool .ctrl-st{color:#5dade2}
.sensor-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sensor-item{text-align:center;padding:10px 4px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.sensor-val{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.sensor-lbl{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.cal-btn{width:100%;padding:10px;margin-top:10px;background:var(--amber-d);border:none;border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer}
.cal-btn:active{transform:scale(.98)}
.reset-btn{width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;margin-top:8px}
.connecting{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Proof<span>Box</span></div>
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <span id="status-txt" style="color:var(--red)">Conectando...</span>
    </div>
  </div>

  <div id="connecting" class="card connecting">
    <div class="spinner"></div>
    <div>Conectando al ProofBox...</div>
    <div style="font-size:10px;margin-top:8px;color:var(--muted)">Asegúrate de tener internet</div>
  </div>

  <div id="main-content" style="display:none">
    <div class="card">
      <div class="card-label">Temperatura</div>
      <div class="temp-row">
        <div>
          <div class="temp-big" id="temp">--<sup>°</sup></div>
          <div class="temp-sub">actual</div>
        </div>
        <div style="display:flex;flex-direction:column;justify-content:center;align-items:flex-end">
          <div style="font-size:12px;color:var(--muted)">objetivo</div>
          <div style="font-family:'Syne',sans-serif;font-size:30px;font-weight:700;color:var(--text)" id="target">--<span style="font-size:13px">°</span></div>
        </div>
      </div>
      <div class="target-row">
        <span class="target-lbl">Ajustar objetivo</span>
        <div class="stepper">
          <button class="step-btn" id="btn-m">−</button>
          <button class="step-btn" id="btn-p">+</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="rise-head">
        <div class="card-label" style="margin:0">Crecimiento de masa</div>
        <div><span class="rise-val" id="rise">--</span><span class="rise-x">×</span></div>
      </div>
      <div class="track"><div class="fill" id="bar" style="width:0%"></div></div>
      <div class="marks"><span>1×</span><span>1.5×</span><span>2×</span><span>2.5×</span><span>3×</span></div>
      <button class="cal-btn" id="btn-cal">⬛ Calibrar punto cero</button>
    </div>

    <div class="card">
      <div class="card-label">Controles</div>
      <div class="ctrl-grid">
        <button class="ctrl-btn" id="btn-heat">
          <i class="ti ti-flame ctrl-icon hi"></i>
          <div class="ctrl-name">Calor</div>
          <div class="ctrl-st" id="heat-st">APAGADO</div>
        </button>
        <button class="ctrl-btn" id="btn-cool">
          <i class="ti ti-snowflake ctrl-icon ci"></i>
          <div class="ctrl-name">Frío</div>
          <div class="ctrl-st" id="cool-st">APAGADO</div>
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Info</div>
      <div class="sensor-row">
        <div class="sensor-item"><div class="sensor-val" id="dist">--</div><div class="sensor-lbl">Distancia</div></div>
        <div class="sensor-item"><div class="sensor-val" id="uptime">--</div><div class="sensor-lbl">Tiempo</div></div>
        <div class="sensor-item"><div class="sensor-val" id="rssi">--</div><div class="sensor-lbl">WiFi</div></div>
      </div>
      <button class="reset-btn" id="btn-reset">⚙ Cambiar red WiFi del ProofBox</button>
    </div>
  </div>
</div>

<script>
// ── CONFIGURACIÓN ──────────────────────────────────────────
const DEVICE_ID   = 'proofbox01';  // mismo que en el .ino
const CMD_SECRET  = 'pb-b3ccb5';   // misma clave que en el .ino
const BROKER_URL  = 'wss://broker.hivemq.com:8884/mqtt';
const TOPIC_STATUS = `proofbox/${DEVICE_ID}/status`;
const TOPIC_CMD    = `proofbox/${DEVICE_ID}/cmd`;

// ── ESTADO ────────────────────────────────────────────────
let tgt = 28.0;
let mqttClient = null;

// ── UI ────────────────────────────────────────────────────
function fmt(n, d=1){ return parseFloat(n).toFixed(d); }

function updateUI(d) {
  document.getElementById('connecting').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';

  document.getElementById('temp').innerHTML   = fmt(d.temp)+'<sup>°</sup>';
  document.getElementById('target').innerHTML = fmt(d.target)+'<span style="font-size:13px">°</span>';
  document.getElementById('rise').textContent = fmt(d.rise);
  document.getElementById('dist').textContent = Math.round(d.dist)+'mm';
  document.getElementById('rssi').textContent = d.rssi+'dB';
  tgt = d.target;

  const s=Math.floor(d.uptime), h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
  document.getElementById('uptime').textContent = h+'h'+String(m).padStart(2,'0');

  const pct = Math.min(100, Math.max(0, ((d.rise-1)/2)*100));
  document.getElementById('bar').style.width = pct+'%';

  document.getElementById('btn-heat').className = 'ctrl-btn'+(d.heat?' on-heat':'');
  document.getElementById('btn-cool').className = 'ctrl-btn'+(d.cool?' on-cool':'');
  document.getElementById('heat-st').textContent = d.heat?'ENCENDIDO':'APAGADO';
  document.getElementById('cool-st').textContent = d.cool?'ENCENDIDO':'APAGADO';

  document.getElementById('dot').className = 'dot ok';
  document.getElementById('status-txt').textContent = 'Conectado';
  document.getElementById('status-txt').style.color = 'var(--green)';
}

function setDisconnected() {
  document.getElementById('dot').className = 'dot';
  document.getElementById('status-txt').textContent = 'Sin conexión';
  document.getElementById('status-txt').style.color = 'var(--red)';
}

// ── MQTT ──────────────────────────────────────────────────
function sendCmd(payload) {
  if (mqttClient && mqttClient.connected) {
    mqttClient.publish(TOPIC_CMD, JSON.stringify({...payload, secret: CMD_SECRET}));
  }
}

function connect() {
  const clientId = 'pb-app-' + Math.random().toString(16).substr(2,8);
  mqttClient = mqtt.connect(BROKER_URL, { clientId, clean: true, reconnectPeriod: 3000 });

  mqttClient.on('connect', () => {
    console.log('MQTT conectado');
    mqttClient.subscribe(TOPIC_STATUS);
  });

  mqttClient.on('message', (topic, message) => {
    try {
      const d = JSON.parse(message.toString());
      updateUI(d);
    } catch(e) {}
  });

  mqttClient.on('disconnect', setDisconnected);
  mqttClient.on('error', (e) => { console.error(e); setDisconnected(); });
}

// ── BOTONES ───────────────────────────────────────────────
document.getElementById('btn-heat').onclick = () => sendCmd({cmd:'heat'});
document.getElementById('btn-cool').onclick = () => sendCmd({cmd:'cool'});
document.getElementById('btn-cal').onclick  = () => sendCmd({cmd:'calibrate'});
document.getElementById('btn-p').onclick = () => { tgt=Math.min(40,tgt+0.5); sendCmd({cmd:'settemp',temp:tgt}); };
document.getElementById('btn-m').onclick = () => { tgt=Math.max(15,tgt-0.5); sendCmd({cmd:'settemp',temp:tgt}); };
document.getElementById('btn-reset').onclick = () => {
  if(confirm('¿Resetear WiFi del ProofBox?')) sendCmd({cmd:'resetwifi'});
};

connect();
</script>
</body>
</html>
